   <!DOCTYPE html>
   <html lang="ru">
   <head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Plan</title>

   <link rel="manifest" href="manifest.json">

   <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
     }

    
   body {
   margin: 0;
   background: radial-gradient(circle at center,
    rgba(255, 0, 0, 0.4) 0%,
    rgba(0, 0, 0, 0.9) 40%,
    #000 80%);
    
   color: white;
   font-family: Arial, sans-serif;
   overflow: hidden;
   }
    
   color: white;
   font-family: Arial, sans-serif;
   overflow: hidden;
   }

   body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background:
    radial-gradient(circle at 20% 30%, rgba(255,0,0,0.25), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,0,0,0.2), transparent 40%),
    radial-gradient(circle at 50% 50%, rgba(255,0,0,0.15), transparent 60%);

  filter: blur(80px);
  z-index: 0;

  pointer-events: none; /* 💥 ВОТ ЭТО ГЛАВНОЕ */
}
   body::after {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background-image:
    radial-gradient(white 1px, transparent 1px);

  background-size: 80px 80px;

  opacity: 0.15;
  z-index: 0;

  pointer-events: none; /* 💥 И ЗДЕСЬ */
}
/* 👉 ВОТ СЮДА */
#mainMenu {
  position: relative;
  z-index: 1;
}
    /* ===================== */
    /* SPLASH */
    /* ===================== */
    #splash {
  position: fixed;
  inset: 0;

  display: flex;
  justify-content: center;
  align-items: flex-start; /* 🔥 поднимает вверх */

  padding-top: 80px; /* 👈 регулируешь */
  
  background: radial-gradient(circle, #1a1a1a, #000);
  z-index: 9999;
}
#splashLogo {
  transform: translateY(-90x);
}

    #splashLogo {
      width: 70%;
      max-width: 420px;
      min-width: 200px;

      opacity: 0;
      transform: scale(0.5);
      border-radius: 20px;

      filter: drop-shadow(0 0 35px rgba(255,0,0,0.8));
      animation: logoAnim 5s ease forwards;
    }

    @keyframes logoAnim {
      0% { opacity: 0; transform: scale(0.4); }
      30% { opacity: 1; transform: scale(1.1); }
      60% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ===================== */
    /* ГЛАВНОЕ МЕНЮ */
    /* ===================== */
    #mainMenu {
  position: fixed;
  inset: 0;

  display: flex;
  flex-direction: column;

  justify-content: flex-start; /* 🔥 теперь сверху */
  align-items: center;

  padding-top: 90px; /* 👈 регулируешь высоту */
  gap: 16px;

  background: black;
  z-index: 2000;
}

    #mainLogo {
  width: 75%;
  max-width: 420px;

  display: block;
  margin: 30px auto;

  /* 🔥 ЧЁРНАЯ ОБВЯЗКА */
  background: black;
  padding: 12px;
  border-radius: 25px;

  /* 🔴 КРАСНОЕ СВЕЧЕНИЕ */
  box-shadow: 0 0 40px rgba(255, 0, 0, 0.8);

  /* 💎 ЧЁТКОСТЬ */
  image-rendering: crisp-edges;
}

    .menuBtn {
      width: 80%;
      max-width: 320px;
      padding: 16px;
      border-radius: 18px;
      background: #111;
      color: white;
      text-align: center;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid rgba(255,0,0,0.2);
    }

    .menuBtn:hover {
      background: #1c1c1c;
      box-shadow: 0 0 10px rgba(255,0,0,0.4);
    }

    /* ===================== */
    /* КНОПКА НАЗАД */
    /* ===================== */
    #backBtn {
  position: fixed;
  top: 15px;
  left: 15px;

  font-size: 16px;
  padding: 10px 16px;

  color: white;

  /* 🔴 ВНУТРЕННИЙ КРАСНЫЙ */
  background: rgba(40, 0, 0, 0.6);

  border-radius: 12px;

  /* 🔴 ОБВОДКА */
  border: 1px solid rgba(255, 0, 0, 0.7);

  /* 🔥 СВЕЧЕНИЕ */
  box-shadow:
    0 0 8px rgba(255, 0, 0, 0.6),
    inset 0 0 10px rgba(255, 0, 0, 0.3);

  cursor: pointer;
  z-index: 9999;
}
#backBtn:active {
  transform: scale(0.95);

  box-shadow:
    0 0 4px rgba(255, 0, 0, 0.4),
    inset 0 0 15px rgba(255, 0, 0, 0.5);
}

    /* ===================== */
    /* ЭТАЖИ */
    /* ===================== */
    #floorPanel {
      position: fixed;
      top: 70px;
      width: 100%;
      padding: 0 8px;
      display: none;
      z-index: 2400;
    }

  #floors {
  display: grid;

  grid-template-columns: repeat(6, auto); /* 👈 важно */

  justify-content: center; /* 👈 центр всей сетки */

  gap: 8px;
  padding: 10px 12px;
}

 .floor-btn {
  padding: 4px 10px; /* 🔥 было больше → стало компактно */
  min-width: 60px;

  border-radius: 16px;

  font-size: 12px; /* чуть меньше текст */

  white-space: nowrap;

  display: inline-flex;
  align-items: center;
  justify-content: center;

  background: rgba(20, 0, 0, 0.6);
  color: white;
  border: none;

  cursor: pointer;

  /* 🔥 мягкий свет (чуть слабее, чтобы не жирнило) */
  box-shadow:
    0 0 4px rgba(255, 0, 0, 0.6),
    0 0 8px rgba(255, 0, 0, 0.5),
    0 0 16px rgba(255, 0, 0, 0.4);

  transition: all 0.2s ease;
}
.floor-btn {
  animation: glowPulse 2s infinite alternate;
}

@keyframes glowPulse {
  from {
    box-shadow:
      0 0 5px rgba(255, 0, 0, 0.5),
      0 0 10px rgba(255, 0, 0, 0.4);
  }
  to {
    box-shadow:
      0 0 10px rgba(255, 0, 0, 0.8),
      0 0 25px rgba(255, 0, 0, 0.6);
  }
}
.floor-btn.active {
  background: rgba(226, 95, 19, 0.918);

  box-shadow:
    0 0 10px red,
    0 0 20px red,
    0 0 40px red;

  transform: scale(1.05);
}

    /* ===================== */
    /* SVG */
    /* ===================== */
    #plan {
      width: 100%;
      height: 80vh;
      display: none;
      margin-top: 110px;
    }

    /* ===================== */
    /* КАРТОЧКА */
    /* ===================== */
    #flatCard {
      position: fixed;
      left: 50%;
      bottom: -300px;
      transform: translateX(-50%);
      width: calc(100% - 16px);
      max-width: 420px;

      background: rgba(20,20,20,0.75);
      backdrop-filter: blur(20px);

      border-radius: 20px 20px 0 0;
      border: 1px solid rgba(255,0,0,0.2);

      padding: 18px;
      color: white;

      transition: 0.35s;
      opacity: 0;
      z-index: 3000;
    }

    #flatCard.show {
      bottom: 0;
      opacity: 1;
    }

    #flatCard h3 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    #flatCard p {
      margin: 6px 0;
      color: #bbb;
    }

    #flatCard span {
      color: white;
      font-weight: 600;
    }

    svg * {
      outline: none !important;
      user-select: none;
    }

  </style>

  <style>

body {

</style>
</head>

<body>

<!-- SPLASH -->

  <img src="logo.png" id="splashLogo">
