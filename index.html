<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan</title>

<link rel="manifest" href="manifest.json">

<style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

/* ===================== */
/* ФОН
/* ===================== */
body {
  margin: 0;
  background-color: #310202;
  background-repeat: no-repeat;
  background-position: center center;
  background-size: cover;

  color: rgb(8, 8, 8);
  font-family: Arial, sans-serif;
  overflow: hidden;
  @media (max-width: 768px) {
  #plan {
    padding-bottom: 200px;
  }
}



/* ===================== */
/* SPLASH */
/* ===================== */
#splash {
  position: fixed;
  inset: 0;

  display: flex;
  justify-content: center;
  align-items: flex-start;

  padding-top: 80px;
  background: radial-gradient(circle, #1a1a1a, #000);

  z-index: 9999;
}

#splashLogo {
  width: 70%;
  max-width: 420px;
  min-width: 200px;

  opacity: 0;
  transform: scale(0.5);
  border-radius: 20px;

  filter: drop-shadow(0 0 35px rgba(255,0,0,0.8));
  animation: logoAnim 5s ease forwards;
}

@keyframes logoAnim {
  0% { opacity: 0; transform: scale(0.4); }
  30% { opacity: 1; transform: scale(1.1); }
  60% { transform: scale(1.05); }
  100% { transform: scale(1); opacity: 1; }
}

/* ===================== */
/* MAIN MENU 1 */
/* ===================== */
#mainMenu1 {
  position: fixed;
  inset: 0;

  display: flex;
  flex-direction: column;
  justify-content: center;   /* вертикально центр */
  align-items: center;       /* горизонтально центр */

  gap: 20px;
  text-align: center;
}

/* ЛОГО */
#mainMenu1 img {
  width: 220px;
  border-radius: 20px;
  box-shadow: 0 0 40px rgba(255,0,0,0.4);
}

.menuBtn {
  width: 85%;
  max-width: 280px;

  padding: 8px 10px;
  margin: 6px auto;

  font-size: 13px;
  line-height: 1.3;

  border-radius: 10px;

  background: #000;
  color: white;

  border: 1px solid rgba(255,0,0,0.5);

  box-shadow:
    0 0 8px rgba(255,0,0,0.5);

  text-align: center;
}
#clientsScreen {
  overflow-y: auto;
  height: 100vh;
  padding-top: 60px;
}

/* ===================== */
/* МЕНЮ */
/* ===================== */
#mainMenu {
  position: fixed;
  inset: 0;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;

  padding-top: 90px;
  gap: 16px;

  z-index: 2000;
}

#mainLogo {
  width: 75%;
  max-width: 420px;

  background: black;
  padding: 12px;
  border-radius: 25px;

  box-shadow: 0 0 40px rgba(255,0,0,0.8);
}

.menuBtn:active {
  transform: scale(0.97);
}

/* ===================== */
/* КНОПКА НАЗАД */
/* ===================== */
#backBtn {
  position: fixed;
  top: 15px;
  left: 15px;

  padding: 8px 14px;
  font-size: 16px;

  background: rgba(40,0,0,0.6);
  border-radius: 10px;

  border: 1px solid rgba(255,0,0,0.6);

  box-shadow:
    0 0 10px rgba(255,0,0,0.6),
    inset 0 0 10px rgba(255,0,0,0.3);

  color: white;
  cursor: pointer;

  z-index: 9999;
}

/* ===================== */
/* ЭТАЖИ */
/* ===================== */
#floorPanel {
  position: fixed;
  top: 70px;
  width: 100%;
  padding: 0 8px;
  display: none;
  z-index: 2400;
}

#floors {
  display: grid;
  grid-template-columns: repeat(6, auto);
  justify-content: center;
  gap: 8px;
}

.floor-btn {
  padding: 4px 10px;
  min-width: 60px;

  border-radius: 16px;
  font-size: 12px;

  background: rgba(20,0,0,0.6);
  color: white;

  display: inline-flex;
  align-items: center;
  justify-content: center;

  white-space: nowrap;
  cursor: pointer;

  box-shadow:
    0 0 6px rgba(255,0,0,0.6),
    0 0 12px rgba(255,0,0,0.5);
}

.floor-btn.active {
  background: rgba(240, 71, 71, 0.9);
  box-shadow:
    0 0 15px red,
    0 0 30px red;
}

/* ===================== */
/* SVG */
/* ===================== */
#plan {
  width: 100%;
  height: 80vh;
  display: none;
  margin-top: 110px;
}

/* ===================== */
/* КАРТОЧКА */
/* ===================== */
#flatCard {
  position: fixed;
  left: 50%;
  bottom: 20px;

  transform: translate(-50%, 50px);

  width: calc(100% - 20px);
  max-width: 420px;

  padding: 18px;
  color: white;

  /* 🔥 стеклянный чёрный */
 background: linear-gradient(
  145deg,
  rgba(30,30,30,0.6),
  rgba(10,10,10,0.75)
);

  backdrop-filter: blur(25px);

  border-radius: 20px;

  border: 1px solid rgba(255,0,0,0.35);

  /* 🔥 красное свечение */
  box-shadow:
    0 0 15px rgba(255,0,0,0.4),
    0 0 50px rgba(255,0,0,0.25),
    inset 0 0 20px rgba(255,255,255,0.03),

  transition: 0.35s ease;

  opacity: 0;
  z-index: 3000;
}

#flatCard::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;

  width: 100%;
  height: 20%; /* 👈 было 50%, уменьшаем */

  border-radius: 20px 20px 0 0;

  background: linear-gradient(
    120deg,
    rgba(255,255,255,0.10) 0%,
    rgba(255,255,255,0.05) 40%,
    rgba(255,255,255,0.02) 70%,
    transparent 100%
  );

  pointer-events: none;
}

#flatCard.show {
  opacity: 1;
  transform: translate(-50%, 0);
}

/* ===================== */
/* ПРОДАННАЯ КАРТОЧКА */
/* ===================== */
#flatCard.sold {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);

  border: 1px solid rgba(255,255,255,0.3);

  /* штриховка */
  background-image: repeating-linear-gradient(
    45deg,
    rgba(255,255,255,0.2) 0px,
    rgba(255,255,255,0.2) 2px,
    transparent 2px,
    transparent 6px
  );
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="logo.png" id="splashLogo">
</div>
<!-- МЕНЮ 1 -->
<div id="mainMenu1">
  <img src="logo.png" id="mainLogo">

  <div class="menuBtn" onclick="openProjects()">Проекты</div>
  <div class="menuBtn" onclick="openClients()">Погашение</div>
  <div class="menuBtn">Мониторинг</div>
</div>
<!-- МЕНЮ -->
<div id="mainMenu" style="display:none;">
  <img src="logo.png" id="mainLogo">

  <div class="menuBtn" onclick="selectProject('kush')">Куш</div>
  <div class="menuBtn" onclick="selectProject('gafurov')">Гафуров</div>
  <div class="menuBtn" onclick="selectProject('buston')">Бустон</div>
  <div class="menuBtn" onclick="selectProject('obj4')">14-15</div>
</div>
<!-- ВОТ СЮДА -->
<div id="clientsScreen" style="display:none;"></div>

<!-- ЭТАЖИ -->
<div id="floorPanel">
  <div id="floors"></div>
</div>

<!-- SVG -->
<object id="plan" type="image/svg+xml" data=""></object>

<!-- НАЗАД -->
<button id="backBtn">Назад</button>

<!-- КАРТОЧКА -->
<div id="flatCard">
  <h3 id="cardTitle">Информация о квартире</h3>
  <p><b>Договор:</b> <span id="cardContract"></span></p>
  <p><b>Площадь:</b> <span id="cardArea"></span></p>
  <p><b>Клиент:</b> <span id="cardClient"></span></p>
</div>
<!-- ПОГАШЕНИЕ -->
<script src="app.js?v=10"></script>

</body>
</html>
