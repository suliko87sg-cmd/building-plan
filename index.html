   <!DOCTYPE html>
   <html lang="ru">
   <head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Plan</title>

   <link rel="manifest" href="manifest.json">

   <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
     }

    
   body {
   margin: 0;
   background: radial-gradient(circle at center,
    rgba(255, 0, 0, 0.4) 0%,
    rgba(0, 0, 0, 0.9) 40%,
    #000 80%);
    
   color: white;
   font-family: Arial, sans-serif;
   overflow: hidden;
   }
    
   color: white;
   font-family: Arial, sans-serif;
   overflow: hidden;
   }

   body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background:
    radial-gradient(circle at 20% 30%, rgba(255,0,0,0.25), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,0,0,0.2), transparent 40%),
    radial-gradient(circle at 50% 50%, rgba(255,0,0,0.15), transparent 60%);

  filter: blur(80px);
  z-index: 0;

  pointer-events: none; /* 💥 ВОТ ЭТО ГЛАВНОЕ */
}
   body::after {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background-image:
    radial-gradient(white 1px, transparent 1px);

  background-size: 80px 80px;

  opacity: 0.15;
  z-index: 0;

  pointer-events: none; /* 💥 И ЗДЕСЬ */
}
/* 👉 ВОТ СЮДА */
#mainMenu {
  position: relative;
  z-index: 1;
}
    /* ===================== */
    /* SPLASH */
    /* ===================== */
    #splash {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, #1a1a1a, #000);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #splashLogo {
      width: 70%;
      max-width: 420px;
      min-width: 200px;

      opacity: 0;
      transform: scale(0.5);
      border-radius: 20px;

      filter: drop-shadow(0 0 35px rgba(255,0,0,0.8));
      animation: logoAnim 5s ease forwards;
    }

    @keyframes logoAnim {
      0% { opacity: 0; transform: scale(0.4); }
      30% { opacity: 1; transform: scale(1.1); }
      60% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ===================== */
    /* ГЛАВНОЕ МЕНЮ */
    /* ===================== */
    #mainMenu {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
      background: black;
      z-index: 2000;
    }

    #mainLogo {
      width: 70%;
      max-width: 260px;
      margin-bottom: 20px;
    }

    .menuBtn {
      width: 80%;
      max-width: 320px;
      padding: 16px;
      border-radius: 18px;
      background: #111;
      color: white;
      text-align: center;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid rgba(255,0,0,0.2);
    }

    .menuBtn:hover {
      background: #1c1c1c;
      box-shadow: 0 0 10px rgba(255,0,0,0.4);
    }

    /* ===================== */
    /* КНОПКА НАЗАД */
    /* ===================== */
    #backBtn {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 2500;
      padding: 10px 16px;
      border-radius: 14px;
      background: #000;
      color: #fff;
      border: none;
      font-size: 16px;
      cursor: pointer;
      display: none;
    }

    /* ===================== */
    /* ЭТАЖИ */
    /* ===================== */
    #floorPanel {
      position: fixed;
      top: 70px;
      width: 100%;
      padding: 0 8px;
      display: none;
      z-index: 2400;
    }

    #floors {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
    }

    .floor-btn {
      border-radius: 14px;
      background: #2b2b2f;
      color: white;
      font-size: 14px;
      padding: 10px;
      border: none;
      cursor: pointer;
    }

    .floor-btn.active {
      background: orange;
      color: black;
      font-weight: bold;
    }

    /* ===================== */
    /* SVG */
    /* ===================== */
    #plan {
      width: 100%;
      height: 80vh;
      display: none;
      margin-top: 110px;
    }

    /* ===================== */
    /* КАРТОЧКА */
    /* ===================== */
    #flatCard {
      position: fixed;
      left: 50%;
      bottom: -300px;
      transform: translateX(-50%);
      width: calc(100% - 16px);
      max-width: 420px;

      background: rgba(20,20,20,0.75);
      backdrop-filter: blur(20px);

      border-radius: 20px 20px 0 0;
      border: 1px solid rgba(255,0,0,0.2);

      padding: 18px;
      color: white;

      transition: 0.35s;
      opacity: 0;
      z-index: 3000;
    }

    #flatCard.show {
      bottom: 0;
      opacity: 1;
    }

    #flatCard h3 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    #flatCard p {
      margin: 6px 0;
      color: #bbb;
    }

    #flatCard span {
      color: white;
      font-weight: 600;
    }

    svg * {
      outline: none !important;
      user-select: none;
    }

  </style>

  <style>

body {

</style>
</head>
