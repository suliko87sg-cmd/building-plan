left: 50%;

transform: translateX(-50%);

max-width: 400px;
background: #111;
border-radius: 15px 15px 0 0;
padding: 15px;
transition: bottom 0.3s ease;
z-index: 9999;
">

  <p><b>Площадь:</b> <span id="cardArea">—</span></p>
