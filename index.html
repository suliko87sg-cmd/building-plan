<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plan</title>

  <link rel="manifest" href="manifest.json">

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* ===================== */
    /* SPLASH */
    /* ===================== */
    #splash {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, #1a1a1a, #000);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #splashLogo {
      width: 70%;
      max-width: 420px;
      min-width: 200px;

      opacity: 0;
      transform: scale(0.5);
      border-radius: 20px;

      filter: drop-shadow(0 0 35px rgba(255,0,0,0.8));
      animation: logoAnim 5s ease forwards;
    }

    @keyframes logoAnim {
      0% { opacity: 0; transform: scale(0.4); }
      30% { opacity: 1; transform: scale(1.1); }
      60% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ===================== */
    /* ГЛАВНОЕ МЕНЮ */
    /* ===================== */
    #mainMenu {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
      background: black;
      z-index: 2000;
    }

    #mainLogo {
      width: 70%;
      max-width: 260px;
      margin-bottom: 20px;
    }

    .menuBtn {
      width: 80%;
      max-width: 320px;
      padding: 16px;
      border-radius: 18px;
      background: #111;
      color: white;
      text-align: center;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid rgba(255,0,0,0.2);
    }

    .menuBtn:hover {
      background: #1c1c1c;
      box-shadow: 0 0 10px rgba(255,0,0,0.4);
    }

    /* ===================== */
    /* КНОПКА НАЗАД */
    /* ===================== */
    #backBtn {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 2500;
      padding: 10px 16px;
      border-radius: 14px;
      background: #000;
      color: #fff;
      border: none;
      font-size: 16px;
      cursor: pointer;
      display: none;
    }

    /* ===================== */
    /* ЭТАЖИ */
    /* ===================== */
    #floorPanel {
      position: fixed;
      top: 70px;
      width: 100%;
      padding: 0 8px;
      display: none;
      z-index: 2400;
    }

   #floors {
  display: grid;
  grid-template-columns: repeat(6, 1fr); /* 🔥 6 кнопок в ряд */
  gap: 8px;
  padding: 10px;
 }

  .floor-btn.active {
  background: orange;
  color: black;
  box-shadow: 0 0 10px rgba(255, 165, 0, 0.6);
}
   
.floor-btn {
  font-size: 12px;
  padding: 6px;
  border-radius: 8px;
  background: #111;
  color: white;

  border: none;
  cursor: pointer;

  min-width: 60px;
  text-align: center;
  }

    

    /* ===================== */
    /* SVG */
    /* ===================== */
    #plan {
      width: 100%;
      height: 80vh;
      display: none;
      margin-top: 110px;
    }

    /* ===================== */
    /* КАРТОЧКА */
    /* ===================== */
    #flatCard {
      position: fixed;
      left: 50%;
      bottom: -300px;
      transform: translateX(-50%);
      width: calc(100% - 16px);
      max-width: 420px;

      background: rgba(20,20,20,0.75);
      backdrop-filter: blur(20px);

      border-radius: 20px 20px 0 0;
      border: 1px solid rgba(255,0,0,0.2);

      padding: 18px;
      color: white;

      transition: 0.35s;
      opacity: 0;
      z-index: 3000;
    }

    #flatCard.show {
      bottom: 0;
      opacity: 1;
    }

    #flatCard h3 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    #flatCard p {
      margin: 6px 0;
      color: #bbb;
    }

    #flatCard span {
      color: white;
      font-weight: 600;
    }

    svg * {
      outline: none !important;
      user-select: none;
    }

  </style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="logo.png" id="splashLogo">
</div>

<!-- МЕНЮ -->
<div id="mainMenu">
  <img src="logo.png" id="mainLogo">

  <div class="menuBtn" onclick="selectProject('kush')">Куш</div>
  <div class="menuBtn" onclick="selectProject('gafurov')">Гафуров</div>
  <div class="menuBtn" onclick="selectProject('buston')">Бустон</div>
  <div class="menuBtn" onclick="selectProject('obj4')">14-15</div>
</div>

<!-- ЭТАЖИ -->
<div id="floorPanel">
  <div id="floors"></div>
</div>

<!-- SVG -->
<object id="plan" type="image/svg+xml" data=""></object>

<!-- НАЗАД -->
<button id="backBtn">Назад</button>

<!-- КАРТОЧКА -->
<div id="flatCard">
  <h3>Информация о квартире</h3>
  <p><b>Договор:</b> <span id="cardContract"></span></p>
  <p><b>Площадь:</b> <span id="cardArea"></span></p>
  <p><b>Клиент:</b> <span id="cardClient"></span></p>
</div>

<script src="app.js?v=10"></script>

</body>
</html>
