<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plan</title>

  <link rel="manifest" href="manifest.json">

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* ===== SPLASH ===== */
    #splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, #1a1a1a, #000000);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.8s ease;
    }

    #splashLogo {
      width: 70%;
      max-width: 420px;
      min-width: 200px;

      opacity: 0;
      transform: scale(0.5);
      border-radius: 20px;

      filter: drop-shadow(0 0 35px rgba(255,0,0,0.8));

      animation: logoAnim 5s ease forwards;
    }

    @media (min-width: 900px) {
      #splashLogo {
        max-width: 500px;
      }
    }

    @keyframes logoAnim {
      0% { opacity: 0; transform: scale(0.4); }
      30% { opacity: 1; transform: scale(1.1); }
      60% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ===== МЕНЮ ===== */
    #mainMenu {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      gap: 20px;

      background: radial-gradient(circle, #0b0f14, #000000);
      z-index: 2000;
    }

    #mainLogo {
      width: 60%;
      max-width: 320px;
      margin-bottom: 20px;
    }

    .menuBtn {
      width: 80%;
      max-width: 300px;

      padding: 14px;
      text-align: center;

      border-radius: 14px;
      border: 1px solid rgba(255,0,0,0.4);

      background: rgba(0,0,0,0.7);
      color: white;
      font-size: 18px;
      font-weight: 600;

      box-shadow: 0 0 15px rgba(255,0,0,0.3);

      cursor: pointer;
      transition: 0.2s;
    }

    .menuBtn:active {
      transform: scale(0.97);
    }

    /* ===== КНОПКА НАЗАД ===== */
    #backBtn {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 2500;
      padding: 10px 16px;
      border: none;
      border-radius: 14px;
      background: #000;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: none;
    }

    /* ===== ЭТАЖИ ===== */
    #floorPanel {
      position: fixed;
      top: 70px;
      left: 0;
      width: 100%;
      z-index: 2400;
      padding: 0 8px;
      display: none;
    }

    #floors {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
    }

    .floor-btn {
      border: none;
      border-radius: 14px;
      background: #2b2b2f;
      color: white;
      font-size: 15px;
      padding: 10px 6px;
      cursor: pointer;
    }

    .floor-btn.active {
      background: orange;
      color: black;
      font-weight: 700;
    }

    /* ===== SVG ===== */
    #plan {
      width: 100%;
      height: 80vh;
      display: none;
      margin-top: 110px;
    }

    /* ===== КАРТОЧКА ===== */
    #flatCard {
      position: fixed;
      left: 50%;
      bottom: -300px;
      transform: translateX(-50%);
      width: calc(100% - 16px);
      max-width: 420px;
      background: rgba(20, 20, 20, 0.75);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 0, 0, 0.2);
      border-radius: 20px 20px 0 0;
      box-shadow:
        0 -10px 40px rgba(0, 0, 0, 0.8),
        0 0 20px rgba(255, 0, 0, 0.15);
      padding: 18px;
      transition: all 0.35s ease;
      z-index: 3000;
      color: white;
      opacity: 0;
    }

    #flatCard.show {
      bottom: 0;
      opacity: 1;
    }

    svg * {
      outline: none !important;
      user-select: none;
    }

  </style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="logo.png" id="splashLogo">
</div>

<!-- МЕНЮ -->
<div id="mainMenu">
  <img src="logo.png" id="mainLogo">

  <div class="menuBtn" onclick="selectProject('gafurov')">Гафуров 2</div>
  <div class="menuBtn" onclick="selectProject('buston')">Бустон 2</div>
  <div class="menuBtn" onclick="selectProject('obj4')">14-15</div>
  <div class="menuBtn" onclick="selectProject('kush')">Куш</div>
</div>

<!-- ЭТАЖИ -->
<div id="floorPanel">
  <div id="floors"></div>
</div>

<!-- SVG -->
<object id="plan" type="image/svg+xml" data="blocks.svg"></object>

<!-- НАЗАД -->
<button id="backBtn">Назад</button>

<!-- КАРТОЧКА -->
<div id="flatCard">
  <h3>Информация о квартире</h3>
  <p><b>Договор:</b> <span id="cardContract">—</span></p>
  <p><b>Площадь:</b> <span id="cardArea">—</span></p>
  <p><b>Клиент:</b> <span id="cardClient">—</span></p>
</div>

<script src="app.js?v=4"></script>

</body>
</html>
